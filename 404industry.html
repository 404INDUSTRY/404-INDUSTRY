<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>404 INDUSTRY</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600;800&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    padding:60px 20px;
    font-family:'Montserrat', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.95), rgba(0,0,0,0.95)), url('logo.png');
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    color:white;
    overflow-x:hidden;
}

.container{
    max-width:900px;
    margin:auto;
    text-align:center;
}

/* TITRE AVEC ANIMATION D’ENTRÉE */
#main-title{
    font-size:64px;
    margin-top:100px;
    color:#00f2ff;
    opacity:0;
    transform:translateY(-100px) rotateX(45deg);
    transition: all 1.5s ease;
    text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff, 0 0 30px #00f2ff;
}

/* TEXTE */
p{
    line-height:1.9;
    color:#ddd;
    font-weight:300;
    max-width:700px;
    margin:auto;
    margin-top:20px;
}

/* BOUTON RETOUR */
.btn-retour{
    position:fixed;
    top:25px;
    left:25px;
    padding:12px 28px;
    border:2px solid white;
    border-radius:30px;
    text-decoration:none;
    color:white;
    font-size:14px;
    letter-spacing:2px;
    transition:0.3s;
    box-shadow:0 0 15px #00f2ff;
}
.btn-retour:hover{
    background:white;
    color:black;
    box-shadow:0 0 30px #00f2ff;
}

/* GRILLE DES CADRES VERTICAUX */
.grid{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:40px;
    margin-top:80px;
}

.card{
    background: rgba(0,0,0,0.7);
    border:2px solid #00f2ff;
    width:320px;
    height:120px;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:white;
    font-size:20px;
    font-weight:bold;
    letter-spacing:1px;
    transition: all 0.4s;
    box-shadow:0 0 15px #00f2ff;
}
.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 40px #00f2ff;
    border-color:#fff;
}

/* ANIMATION APPARITION */
.reveal{
    opacity:0;
    transform:translateY(40px);
    transition:all 1s ease;
}
.reveal.active{
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<a href="univers404.html" class="btn-retour">← RETOUR</a>

<div class="container">
    <!-- TITRE PRINCIPAL AVEC ANIMATION D’ENTRÉE -->
    <h1 id="main-title">404 INDUSTRY</h1>

    <!-- PRESENTATION COURTE -->
    <div class="reveal">
        <p>Un label indépendant émergent de la scène musicale ivoirienne, mélangeant vision stratégique, énergie street et puissance mélodique. 🌍🔥</p>
    </div>

    <div class="divider"></div>

    <!-- TROIS CADRES VERTICAUX -->
    <div class="grid reveal">
        <a href="404artists.html" class="card">404 ARTISTS</a>
        <a href="404familly.html" class="card">404 FAMILLY</a>
        <a href="404squad.html" class="card">404 SQUAD</a>
    </div>
</div>

<script>
// Animation titre à l’arrivée
window.addEventListener('load', () => {
    const title = document.getElementById('main-title');
    title.style.opacity = '1';
    title.style.transform = 'translateY(0) rotateX(0deg)';
});

// Animation progressive du texte et des cadres
function revealOnScroll(){
    const reveals=document.querySelectorAll('.reveal');
    reveals.forEach(el=>{
        const windowHeight=window.innerHeight;
        const elementTop=el.getBoundingClientRect().top;
        if(elementTop < windowHeight - 100){
            el.classList.add('active');
        }
    });
}
window.addEventListener('scroll', revealOnScroll);
window.addEventListener('load', revealOnScroll);
</script>

</body>
</html>
