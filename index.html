<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>404 INDUSTRY</title>
<style>
/* === Background & Layout === */
body{
    margin:0;
    padding:0;
    font-family: 'Arial', sans-serif;
    color: white;
    text-align:center;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('logo.png'); /* ton logo en arrière-plan */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* === Neon Text === */
h1 {
    font-size: 70px;
    color: #fff;
    text-shadow:
        0 0 5px #fff,
        0 0 10px #fff,
        0 0 20px #ff0000,
        0 0 30px #ff0000,
        0 0 40px #ff0000,
        0 0 55px #ff0000,
        0 0 75px #ff0000;
}

/* Subtitle */
p {
    font-size: 24px;
    color: #ccc;
    text-shadow: 0 0 5px #fff;
}

/* Neon Button */
.btn {
    display:inline-block;
    margin-top:40px;
    padding:15px 40px;
    color:white;
    background:transparent;
    border:2px solid #ff0000;
    text-decoration:none;
    font-weight:bold;
    border-radius:5px;
    box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #ff0000;
    transition: 0.3s;
}

.btn:hover {
    background:#ff0000;
    color:black;
    box-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 60px #ff0000;
}

/* Footer */
.footer{
    position:absolute;
    bottom:20px;
    font-size:14px;
    color:#aaa;
}
</style>
</head>

<body>

<h1>404 INDUSTRY</h1>
<p>DRILL • GANG • NEON VIBES</p>
<a href="#" class="btn">ENTER THE ZONE</a>

<div class="footer">
© 2026 404 INDUSTRY — All Rights Reserved
</div>

</body>
</html>
