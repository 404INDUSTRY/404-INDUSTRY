<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>404 INDUSTRY</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    font-family:'Anton', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('logo.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    color:white;
    text-align:center;
    overflow:hidden;
}

/* CONTENU */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    font-size:85px;
    letter-spacing:5px;
    text-shadow:0 0 40px #000;
}

.subtitle{
    font-size:22px;
    color:#ccc;
    margin-top:15px;
    letter-spacing:3px;
}

.btn-univers{
    margin-top:70px;
    padding:22px 75px;
    font-size:28px;
    color:#fff;
    border:2px solid #fff;
    border-radius:12px;
    text-decoration:none;
    letter-spacing:3px;
    box-shadow:0 0 35px #00f2ff;
    transition:0.3s;
}

.btn-univers:hover{
    background:white;
    color:black;
}

/* TRANSITION ECRAN NOIR */
#transition{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    opacity:0;
    pointer-events:none;
    transition:opacity 1s ease;
    z-index:9999;
}

#transition.active{
    opacity:1;
}
</style>
</head>

<body>

<div class="container">
    <h1>404 INDUSTRY</h1>
    <p class="subtitle">VISION • DISCIPLINE • IMPACT</p>

    <a href="#" class="btn-univers" onclick="goToPage(event)">
        PLONGE DANS L'UNIVERS DU 404
    </a>
</div>

<div id="transition"></div>

<script>
function goToPage(e){
    e.preventDefault();

    const transition = document.getElementById("transition");
    transition.classList.add("active");

    setTimeout(function(){
        window.location.href = "univers404.html";
    },1000);
}
</script>

</body>
</html>
